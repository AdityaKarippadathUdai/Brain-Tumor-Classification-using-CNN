<svg width="100%" height="auto" viewBox="0 0 1400 920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#041030"/>
    </linearGradient>
    <linearGradient id="layerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0, 255, 255, 0.08)"/>
      <stop offset="100%" stop-color="rgba(0, 150, 255, 0.04)"/>
    </linearGradient>
    <linearGradient id="lossGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#ff8888"/>
    </linearGradient>
    <linearGradient id="accGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff66"/>
      <stop offset="100%" stop-color="#88ffaa"/>
    </linearGradient>
    <linearGradient id="softmaxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(0, 200, 255, 0.2)"/>
      <stop offset="100%" stop-color="rgba(0, 255, 100, 0.08)"/>
    </linearGradient>
    <linearGradient id="denseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0, 180, 255, 0.06)"/>
      <stop offset="100%" stop-color="rgba(0, 255, 200, 0.02)"/>
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ffff"/>
    </marker>
    <marker id="arrowhead-down" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ffff"/>
    </marker>

    <!-- Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <!-- Title Section -->
  <text x="700" y="50" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="38" font-weight="bold" fill="#00ffff" filter="url(#glow)">
    🧠 Brain Tumor Classification using CNN
  </text>
  <text x="700" y="85" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="18" fill="#bbbbbb">
    Complete Training Pipeline — Convolutional Neural Network
  </text>

  <!-- ==================== MAIN PIPELINE ==================== -->

  <!-- 1. MRI INPUT -->
  <rect x="50" y="140" width="160" height="160" rx="16" fill="url(#layerGrad)" stroke="#00ffff" stroke-width="1.5"/>
  <image href="https://upload.wikimedia.org/wikipedia/commons/0/0e/MRI_head_side.jpg" x="65" y="155" width="130" height="130"/>
  <text x="130" y="330" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">MRI Scan</text>
  <text x="130" y="350" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#88aacc">(T1-Weighted)</text>

  <!-- Arrow: Input → Preprocess -->
  <path d="M210 220 L270 220" stroke="#00ffff" stroke-width="2.5" fill="none" stroke-dasharray="8 6" marker-end="url(#arrowhead)">
    <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="1.5s" repeatCount="indefinite"/>
  </path>

  <!-- 2. PREPROCESSING -->
  <rect x="280" y="130" width="190" height="180" rx="16" fill="url(#layerGrad)" stroke="#00ffff" stroke-width="1.5"/>
  <text x="375" y="158" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Preprocessing</text>
  <circle cx="310" cy="175" r="3" fill="#00ffff"/>
  <text x="320" y="180" font-family="system-ui, Arial, sans-serif" font-size="13" fill="#cccccc">Resize → 224×224</text>
  <circle cx="310" cy="200" r="3" fill="#00ffff"/>
  <text x="320" y="205" font-family="system-ui, Arial, sans-serif" font-size="13" fill="#cccccc">Normalize (0–1)</text>
  <circle cx="310" cy="225" r="3" fill="#00ffff"/>
  <text x="320" y="230" font-family="system-ui, Arial, sans-serif" font-size="13" fill="#cccccc">Data Augmentation</text>
  <circle cx="310" cy="250" r="3" fill="#00ffff"/>
  <text x="320" y="255" font-family="system-ui, Arial, sans-serif" font-size="13" fill="#cccccc">Noise Reduction</text>
  <circle cx="310" cy="275" r="3" fill="#00ffff"/>
  <text x="320" y="280" font-family="system-ui, Arial, sans-serif" font-size="13" fill="#cccccc">Batch Generation</text>

  <!-- Arrow: Preprocess → Conv1 -->
  <path d="M470 220 L530 220" stroke="#00ffff" stroke-width="2.5" fill="none" stroke-dasharray="8 6" marker-end="url(#arrowhead)">
    <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="1.5s" repeatCount="indefinite"/>
  </path>

  <!-- 3. CONV BLOCK 1 -->
  <rect x="540" y="120" width="210" height="200" rx="16" fill="url(#layerGrad)" stroke="#00ffff" stroke-width="1.5"/>
  <text x="645" y="148" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Conv Block 1</text>
  
  <g stroke="#00ffff" opacity="0.5">
    <line x1="570" y1="175" x2="720" y2="175"/>
    <line x1="570" y1="195" x2="720" y2="195"/>
    <line x1="570" y1="215" x2="720" y2="215"/>
    <line x1="570" y1="235" x2="720" y2="235"/>
    <line x1="570" y1="255" x2="720" y2="255"/>
    <line x1="570" y1="275" x2="720" y2="275"/>
    <line x1="570" y1="295" x2="720" y2="295"/>
    <line x1="570" y1="175" x2="570" y2="295"/>
    <line x1="600" y1="175" x2="600" y2="295"/>
    <line x1="630" y1="175" x2="630" y2="295"/>
    <line x1="660" y1="175" x2="660" y2="295"/>
    <line x1="690" y1="175" x2="690" y2="295"/>
    <line x1="720" y1="175" x2="720" y2="295"/>
  </g>
  
  <rect x="575" y="185" width="40" height="40" fill="rgba(0, 255, 255, 0.3)" stroke="#00ffff" stroke-width="2" rx="4">
    <animate attributeName="x" from="575" to="680" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <text x="645" y="315" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#88ccff">Conv2D 64, ReLU</text>
  <text x="645" y="332" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#88ccff">BatchNorm + MaxPool</text>

  <!-- Arrow: Conv1 → Conv2 -->
  <path d="M750 220 L810 220" stroke="#00ffff" stroke-width="2.5" fill="none" stroke-dasharray="8 6" marker-end="url(#arrowhead)">
    <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="1.5s" repeatCount="indefinite"/>
  </path>

  <!-- 4. CONV BLOCK 2 -->
  <rect x="820" y="120" width="210" height="200" rx="16" fill="url(#layerGrad)" stroke="#00ffff" stroke-width="1.5"/>
  <text x="925" y="148" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Conv Block 2</text>
  
  <rect x="850" y="175" width="28" height="110" fill="#00ffff" opacity="0.4" rx="4"/>
  <rect x="885" y="160" width="28" height="125" fill="#00ffff" opacity="0.55" rx="4"/>
  <rect x="920" y="185" width="28" height="100" fill="#00ffff" opacity="0.7" rx="4"/>
  <rect x="955" y="170" width="28" height="115" fill="#00ffff" opacity="0.85" rx="4"/>
  
  <text x="925" y="315" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#88ccff">Conv2D 128, ReLU</text>
  <text x="925" y="332" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#88ccff">BatchNorm + MaxPool</text>

  <!-- Arrow: Conv2 → Flatten -->
  <path d="M1030 220 L1090 220" stroke="#00ffff" stroke-width="2.5" fill="none" stroke-dasharray="8 6" marker-end="url(#arrowhead)">
    <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="1.5s" repeatCount="indefinite"/>
  </path>

  <!-- 5. FLATTEN -->
  <rect x="1100" y="150" width="130" height="140" rx="16" fill="url(#layerGrad)" stroke="#00ffff" stroke-width="1.5"/>
  <text x="1165" y="195" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Flatten</text>
  <text x="1165" y="225" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#cccccc">3D → 1D</text>
  <text x="1165" y="250" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#cccccc">50,176 units</text>

  <!-- Curved arrow to Dense Network -->
  <path d="M1165 290 L1165 390 L690 390 L690 480" stroke="#00ffff" stroke-width="2.5" fill="none" stroke-dasharray="8 6" marker-end="url(#arrowhead)">
    <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="1.5s" repeatCount="indefinite"/>
  </path>

  <!-- ==================== DENSE NETWORK (EXCLUDING SOFTMAX) ==================== -->
  <rect x="380" y="490" width="620" height="220" rx="20" fill="url(#denseGrad)" stroke="#00ffff" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="690" y="518" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Dense Neural Network</text>

  <!-- Dense 512 -->
  <rect x="430" y="540" width="140" height="80" rx="10" fill="rgba(0, 255, 255, 0.1)" stroke="#00ffff" stroke-width="1"/>
  <text x="500" y="575" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Dense 512</text>
  <text x="500" y="595" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="11" fill="#aaccff">ReLU + L2 Reg</text>

  <path d="M570 580 L610 580" stroke="#00ffff" stroke-width="2" fill="none" marker-end="url(#arrowhead)">
    <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1s" repeatCount="indefinite"/>
  </path>

  <!-- Dropout -->
  <rect x="620" y="540" width="120" height="80" rx="10" fill="rgba(255, 100, 100, 0.08)" stroke="#ff6666" stroke-width="1"/>
  <text x="680" y="575" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffaaaa">Dropout 0.5</text>
  <text x="680" y="595" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="11" fill="#ffaaaa">Prevents overfitting</text>

  <path d="M740 580 L780 580" stroke="#00ffff" stroke-width="2" fill="none" marker-end="url(#arrowhead)">
    <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1s" repeatCount="indefinite"/>
  </path>

  <!-- Dense 256 -->
  <rect x="790" y="540" width="140" height="80" rx="10" fill="rgba(0, 255, 255, 0.1)" stroke="#00ffff" stroke-width="1"/>
  <text x="860" y="575" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Dense 256</text>
  <text x="860" y="595" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="11" fill="#aaccff">ReLU</text>

  <!-- Arrow: Dense → Softmax (outside dense block) -->
  <path d="M930 580 L1000 580" stroke="#00ffff" stroke-width="2.5" fill="none" stroke-dasharray="8 6" marker-end="url(#arrowhead)">
    <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="1.5s" repeatCount="indefinite"/>
  </path>

  <!-- ==================== SOFTMAX OUTPUT (SEPARATE BLOCK) ==================== -->
  <rect x="1010" y="530" width="200" height="110" rx="16" fill="url(#softmaxGrad)" stroke="#00ffaa" stroke-width="1.5" filter="url(#glow)"/>
  <text x="1110" y="560" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="16" font-weight="bold" fill="#00ffcc">Softmax Output</text>
  
  <!-- Class probabilities -->
  <text x="1040" y="588" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#ffffff">Glioma</text>
  <rect x="1090" y="580" width="75" height="8" rx="4" fill="#00ff66"/>
  <text x="1175" y="588" font-family="system-ui, Arial, sans-serif" font-size="11" fill="#cccccc">96.7%</text>
  
  <text x="1040" y="608" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#ffffff">Meningioma</text>
  <rect x="1090" y="600" width="18" height="8" rx="4" fill="#ffaa00"/>
  <text x="1175" y="608" font-family="system-ui, Arial, sans-serif" font-size="11" fill="#cccccc">2.1%</text>
  
  <text x="1040" y="628" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#ffffff">Pituitary</text>
  <rect x="1090" y="620" width="8" height="8" rx="4" fill="#ff4444"/>
  <text x="1175" y="628" font-family="system-ui, Arial, sans-serif" font-size="11" fill="#cccccc">1.2%</text>

  <!-- ==================== METRICS SECTION ==================== -->
  <rect x="40" y="500" width="280" height="210" rx="16" fill="url(#layerGrad)" stroke="#00ffff" stroke-width="1" opacity="0.8"/>
  <text x="180" y="530" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="16" font-weight="bold" fill="#00ffff">📊 Training Metrics</text>

  <!-- Loss -->
  <text x="65" y="565" font-family="system-ui, Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff8888">Loss</text>
  <rect x="110" y="555" width="190" height="16" rx="8" fill="#1a1a2e" stroke="#444" stroke-width="0.5"/>
  <rect x="110" y="555" width="190" height="16" rx="8" fill="url(#lossGrad)">
    <animate attributeName="width" from="190" to="22" dur="4s" fill="freeze"/>
  </rect>
  <text x="310" y="568" font-family="system-ui, Arial, sans-serif" font-size="11" fill="#ffaaaa">→ 0.12</text>

  <!-- Accuracy -->
  <text x="65" y="605" font-family="system-ui, Arial, sans-serif" font-size="14" font-weight="bold" fill="#88ffaa">Accuracy</text>
  <rect x="110" y="595" width="190" height="16" rx="8" fill="#1a1a2e" stroke="#444" stroke-width="0.5"/>
  <rect x="110" y="595" width="190" height="16" rx="8" fill="url(#accGrad)">
    <animate attributeName="width" from="30" to="186" dur="4s" fill="freeze"/>
  </rect>
  <text x="310" y="608" font-family="system-ui, Arial, sans-serif" font-size="11" fill="#aaffaa">97.8%</text>

  <!-- Extra details -->
  <text x="65" y="645" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#cccccc">Optimizer:</text>
  <text x="140" y="645" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#00ffff">Adam (lr=1e-4)</text>
  <text x="65" y="668" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#cccccc">Batch Size:</text>
  <text x="155" y="668" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#00ffff">32</text>
  <text x="65" y="691" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#cccccc">Epochs:</text>
  <text x="125" y="691" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#00ffff">100 (early stopping)</text>

  <!-- Epoch Animation -->
  <rect x="360" y="740" width="680" height="50" rx="25" fill="rgba(0, 255, 255, 0.08)" stroke="#00ffff" stroke-width="1.5"/>
  <text x="700" y="772" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="22" font-weight="bold" fill="#00ffff">
    🔄 Training Epoch 42 / 100
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- Footer -->
  <text x="700" y="830" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#6688aa">
    Model: Custom CNN | Input: 224×224×3 | Total Parameters: ~2.3M | Framework: TensorFlow/PyTorch
  </text>
  <text x="700" y="855" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="11" fill="#446688">
    🧬 Pipeline visualization for brain tumor classification (Glioma, Meningioma, Pituitary)
  </text>
</svg>
